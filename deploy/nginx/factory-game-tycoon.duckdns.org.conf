server {
    listen 80;
    server_name factory-game-tycoon.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name factory-game-tycoon.duckdns.org;

    ssl_certificate /etc/nginx/ssl/factory-game-tycoon/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/factory-game-tycoon/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        set $factory_game_frontend factory-game-tycoon-frontend:80;
        proxy_pass http://$factory_game_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300;
    }
}
